name: Deploy

on:
  push:
    branches: [main]

permissions:
  contents: read

jobs:
  check-changes:
    runs-on: ubuntu-latest
    outputs:
      server-changed: ${{ steps.check.outputs.server }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 2
      - id: check
        run: |
          if git diff HEAD~1 --quiet -- apps/server/; then
            echo "server=false" >> $GITHUB_OUTPUT
          else
            echo "server=true" >> $GITHUB_OUTPUT
          fi

  deploy-server:
    needs: check-changes
    if: needs.check-changes.outputs.server-changed == 'true'
    runs-on: ubuntu-latest
    steps:
      - name: Trigger Render deployment
        run: |
          curl -X POST https://api.render.com/deploy/srv-${{ secrets.RENDER_SERVICE_ID }}?key=${{ secrets.RENDER_API_KEY }}

name: Keep Render server awake

on:
  schedule:
    # GitHub Actions cron has ~5-min granularity and isn't perfectly punctual.
    # We aim for every 10 min; Render free tier sleeps after 15 min idle.
    - cron: '*/10 * * * *'
  workflow_dispatch:

permissions:
  contents: read

jobs:
  ping:
    runs-on: ubuntu-latest
    steps:
      - name: Ping /health
        run: |
          URL="${{ vars.RENDER_HEALTH_URL }}"
          if [ -z "$URL" ]; then
            echo "Set repo variable RENDER_HEALTH_URL (e.g. https://sgb-server.onrender.com/health)"
            exit 1
          fi
          for i in 1 2 3; do
            if curl -fsS --max-time 45 "$URL"; then
              echo " - ping ok"
              exit 0
            fi
            echo "attempt $i failed, retrying..."
            sleep 5
          done
          echo "all attempts failed"
          exit 1
